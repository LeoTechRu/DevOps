<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName erp.dev.intdata.pro
    ServerAlias www.erp.dev.intdata.pro

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass /.well-known/acme-challenge/ !
    Alias /.well-known/acme-challenge/ "/var/www/erp.dev.intdata.pro/.well-known/acme-challenge/"

    ProxyPass /api/erp/v1 http://127.0.0.1:8503/api/erp/v1 timeout=60
    ProxyPassReverse /api/erp/v1 http://127.0.0.1:8503/api/erp/v1

    ProxyPass / http://127.0.0.1:3003/ timeout=60
    ProxyPassReverse / http://127.0.0.1:3003/

    ErrorLog ${APACHE_LOG_DIR}/erp.dev.intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/erp.dev.intdata.pro.access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/erp.dev.intdata.pro/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/erp.dev.intdata.pro/privkey.pem
</VirtualHost>
</IfModule>

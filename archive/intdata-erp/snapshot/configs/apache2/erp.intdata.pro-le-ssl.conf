<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName erp.intdata.pro
    ServerAlias www.erp.intdata.pro

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass /.well-known/acme-challenge/ !
    Alias /.well-known/acme-challenge/ "/var/www/erp.intdata.pro/.well-known/acme-challenge/"

    ProxyPass / http://127.0.0.1:8069/ timeout=60
    ProxyPassReverse / http://127.0.0.1:8069/

    ErrorLog ${APACHE_LOG_DIR}/erp.intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/erp.intdata.pro.access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/erp.intdata.pro/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/erp.intdata.pro/privkey.pem
</VirtualHost>
</IfModule>

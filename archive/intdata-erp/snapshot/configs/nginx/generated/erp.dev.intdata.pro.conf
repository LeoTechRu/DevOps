server {
    listen 80;
    listen [::]:80;
    server_name erp.dev.intdata.pro www.erp.dev.intdata.pro;

    access_log /var/log/nginx/erp.dev.intdata.pro.access.log main;
    error_log  /var/log/nginx/erp.dev.intdata.pro.error.log warn;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_pass http://127.0.0.1:7080;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.dev.intdata.pro www.erp.dev.intdata.pro;

    access_log /var/log/nginx/erp.dev.intdata.pro.access.log main;
    error_log  /var/log/nginx/erp.dev.intdata.pro.error.log warn;

    ssl_certificate     /etc/letsencrypt/live/erp.dev.intdata.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.dev.intdata.pro/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_pass http://127.0.0.1:7080;
    }
}
